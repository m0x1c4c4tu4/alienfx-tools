name: Build All

on:
  push:
    branches: [master, main]
    paths-ignore:
      - '*.md'
      - 'Doc/**'
      - 'DPTF/**'
      - '.sisyphus/**'
  pull_request:
    branches: [master, main]
    paths-ignore:
      - '*.md'
      - 'Doc/**'
      - 'DPTF/**'
      - '.sisyphus/**'
  workflow_dispatch:
    inputs:
      configuration:
        description: 'Build configuration'
        required: true
        default: 'Release'
        type: choice
        options:
          - Release
          - Debug

jobs:
  build:
    name: Build ${{ matrix.configuration }} | ${{ matrix.platform }}
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        configuration: [Release]
        platform: [x64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore alienfx-tools.sln

      - name: Build Solution
        run: msbuild alienfx-tools.sln /p:Configuration=${{ matrix.configuration }} /p:Platform=${{ matrix.platform }} /v:minimal /m

      - name: Collect artifacts
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          $exes = @(
            "x64\${{ matrix.configuration }}\alienfx-gui.exe",
            "x64\${{ matrix.configuration }}\alienfx-cli.exe",
            "x64\${{ matrix.configuration }}\alienfx-mon.exe",
            "x64\${{ matrix.configuration }}\alienfx-gui-winui3.exe",
            "x64\${{ matrix.configuration }}\alienfan-gui.exe",
            "x64\${{ matrix.configuration }}\alienfan-cli.exe"
          )
          foreach ($exe in $exes) {
            if (Test-Path $exe) {
              Copy-Item $exe artifacts/ -Force
              Write-Host "Found: $exe"
            }
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: alienfx-tools-${{ matrix.configuration }}-${{ matrix.platform }}
          path: artifacts/
          retention-days: 30
